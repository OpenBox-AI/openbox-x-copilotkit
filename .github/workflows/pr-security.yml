name: PR Security

on:
  pull_request:
    branches: [main]
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pull-requests: read
  security-events: write

concurrency:
  group: pr-security-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GITLEAKS_VERSION: "8.30.0"
  GITLEAKS_LINUX_X64_SHA256: "79a3ab579b53f71efd634f3aaf7e04a0fa0cf206b7ed434638d1547a2470a66e"

jobs:
  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@e07451d2e059ed86c2870430ea286b3a9e0bf241
        with:
          cache: true
          version: v0.69.2

      - name: Run Trivy filesystem scan for console output
        id: trivy_console
        continue-on-error: true
        shell: bash
        run: |
          echo "### Trivy Filesystem Scan Results 🛡️" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          
          trivy fs . \
            --scanners vuln,misconfig \
            --vuln-type os,library \
            --ignore-unfixed \
            --severity HIGH,CRITICAL \
            --include-dev-deps \
            --ignorefile .trivyignore \               
            --format table \
            --exit-code 1 | tee -a $GITHUB_STEP_SUMMARY || EXIT_CODE=$?
            
          echo '```' >> $GITHUB_STEP_SUMMARY
        
          exit ${EXIT_CODE:-0}

      - name: Run Trivy filesystem scan for SARIF
        id: trivy_sarif
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          trivy fs . \
            --scanners vuln,misconfig \
            --vuln-type os,library \
            --ignore-unfixed \
            --severity HIGH,CRITICAL \
            --include-dev-deps \
            --ignorefile .trivyignore \               
            --format sarif \
            --output trivy-fs-results.sarif \
            --exit-code 1

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-fs

      - name: Upload Trivy SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-results
          path: trivy-fs-results.sarif
          if-no-files-found: error

      - name: Fail job when Trivy detects issues
        if: always()
        shell: bash
        run: |
          if [[ "${{ steps.trivy_console.outcome }}" == "failure" || "${{ steps.trivy_sarif.outcome }}" == "failure" ]]; then
            echo "Trivy detected HIGH/CRITICAL findings."
            exit 1
          fi

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks CLI
        shell: bash
        run: |
          set -euo pipefail
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive}" -o "${archive}"
          echo "${GITLEAKS_LINUX_X64_SHA256}  ${archive}" | sha256sum -c -
          tar -xzf "${archive}" gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks

      - name: Run Gitleaks SARIF scan
        id: gitleaks_scan
        continue-on-error: true
        shell: bash
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PULL_REQUEST_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          log_opts="-1"
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" && -n "${PULL_REQUEST_BASE_SHA}" ]]; then
            log_opts="${PULL_REQUEST_BASE_SHA}..HEAD"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && -n "${PUSH_BEFORE_SHA}" && ! "${PUSH_BEFORE_SHA}" =~ ^0+$ ]]; then
            log_opts="${PUSH_BEFORE_SHA}..HEAD"
          fi
          
          echo "### Gitleaks Git Scan Results 🕵️‍♂️" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          
          EXIT_CODE=0
          gitleaks git . \
            --config .gitleaks.toml \
            --log-opts "${log_opts}" \
            --report-format sarif \
            --report-path results.sarif \
            --redact \
            --exit-code 1 \
            --no-color \
            --no-banner 2>&1 | tee -a $GITHUB_STEP_SUMMARY || EXIT_CODE=$?
            
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          if [ $EXIT_CODE -eq 0 ]; then
            echo "**Result:** No leaks detected ✅" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Result:** Potential secrets detected ❌" >> $GITHUB_STEP_SUMMARY
          fi
          
          exit $EXIT_CODE

      - name: Ensure Gitleaks SARIF file exists
        if: always()
        shell: bash
        run: |
          if [ -f results.sarif ]; then
            exit 0
          fi

          cat > results.sarif <<'EOF'
          {
            "version": "2.1.0",
            "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
            "runs": [
              {
                "tool": {
                  "driver": {
                    "name": "gitleaks",
                    "informationUri": "https://github.com/gitleaks/gitleaks",
                    "rules": []
                  }
                },
                "results": []
              }
            ]
          }
          EOF


      - name: Upload Gitleaks SARIF to GitHub Security
        if: always() && hashFiles('results.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          category: gitleaks

      - name: Upload Gitleaks SARIF artifact
        if: always() && hashFiles('results.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-results
          path: results.sarif
          if-no-files-found: error

      - name: Fail job when Gitleaks detects issues
        if: always()
        shell: bash
        run: |
          if [[ "${{ steps.gitleaks_scan.outcome }}" == "failure" ]]; then
            echo "Gitleaks detected potential secrets."
            exit 1
          fi
